<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Your Ninja Translate settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2F2F7" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- API_BASE_PLACEHOLDER: replaced by deploy step. Empty = same-origin. -->
  <meta name="api-base" content="" />
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="/u.css" />
</head>
<body x-data="userPage()" x-init="init()">

  <main class="page">

    <!-- Brand chip + page title -->
    <header class="hero">
      <div class="brand-row">
        <span class="brand">🥷 Ninja Translate</span>
        <span class="status-pill" :class="state" x-show="state !== 'loading'" x-text="state === 'ready' ? 'Live' : 'Expired'"></span>
      </div>
      <h1 class="title">Your settings</h1>
      <p class="subtitle">These follow you to every group the bot is in.</p>
    </header>

    <!-- Loading -->
    <div x-show="state === 'loading'" class="empty-state">Loading…</div>

    <!-- Expired -->
    <section x-show="state === 'expired'">
      <div class="card error-card">
        <p class="error-icon">🔗</p>
        <h2>This link has expired</h2>
        <p>Send any message to the Ninja bot on WhatsApp to get a fresh link. Your saved preferences are unchanged.</p>
      </div>
    </section>

    <!-- READY -->
    <template x-if="state === 'ready'">
      <div>

        <!-- Onboarding (first-visit) -->
        <section x-show="showIntro" class="intro card">
          <h2>Welcome 👋</h2>
          <p>Ninja translates voice notes and <code>@mentions</code> across every language people speak in your WhatsApp groups. Tweak the dials below — they follow you everywhere the bot lives.</p>
          <video x-show="hasVideo"
                 src="/assets/videos/how-to.mp4"
                 controls playsinline preload="metadata"
                 @error="hasVideo = false"></video>
          <button type="button" class="btn-primary" @click="dismissIntro()">Got it</button>
        </section>

        <!-- ════════ POLISH (PRIMARY) ════════ -->
        <p class="section-header">Polish level</p>
        <div class="card">
          <template x-for="opt in POLISH_OPTIONS" :key="opt.value">
            <div class="row row-selectable" @click="f.polishLevel = opt.value">
              <div class="row-stack">
                <span class="row-label" x-text="opt.title"></span>
                <span class="row-sub" x-text="opt.sub"></span>
              </div>
              <span class="row-check" x-show="f.polishLevel === opt.value">✓</span>
            </div>
          </template>
        </div>
        <p class="section-footer">Voice only — how much your transcript gets cleaned up before translating.</p>

        <!-- ════════ TONE (PRIMARY) ════════ -->
        <p class="section-header">Tone</p>
        <div class="card">
          <div class="row row-segmented">
            <div class="segmented">
              <template x-for="opt in TONE_OPTIONS" :key="opt.value">
                <button type="button"
                        :class="{ active: f.tone === opt.value }"
                        @click="f.tone = opt.value">
                  <span x-text="opt.title"></span>
                </button>
              </template>
            </div>
          </div>
        </div>
        <p class="section-footer">The register and formality of your translations.</p>

        <!-- visual divider before secondary group -->
        <p class="section-divider-label">More</p>

        <!-- ════════ SPEAKER LANGUAGE ════════ -->
        <p class="section-header">Speaker language</p>
        <div class="card">
          <div class="row">
            <label for="lang-hint" class="row-label">Usually speak</label>
            <select id="lang-hint" name="lang-hint" class="picker" x-model="f.sourceLanguageHint">
              <option :value="null">Auto-detect</option>
              <template x-for="lang in AVAILABLE_LANGUAGES" :key="lang.code">
                <option :value="lang.code" x-text="lang.flag + ' ' + lang.name"></option>
              </template>
            </select>
          </div>
        </div>
        <p class="section-footer">Helps source detection on accented or short clips.</p>

        <!-- ════════ VOICE NOTES ════════ -->
        <p class="section-header">Voice notes</p>
        <div class="card">
          <div class="row">
            <span class="row-label">Translate my voice notes</span>
            <label class="toggle">
              <input type="checkbox" x-model="f.voiceTranslate" />
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>
        <p class="section-footer">Off = your voice notes won't trigger translations. Other people's are unaffected.</p>

        <!-- ════════ REPLY ════════ -->
        <p class="section-header">Reply formatting</p>
        <div class="card">
          <div class="row">
            <span class="row-label">Show source label</span>
            <label class="toggle">
              <input type="checkbox" x-model="f.showSourceLabel" />
              <span class="toggle-track"></span>
            </label>
          </div>
          <div class="row">
            <span class="row-label">Show 🌐 while translating</span>
            <label class="toggle">
              <input type="checkbox" x-model="f.showProcessingReaction" />
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>
        <p class="section-footer">Both shown on your messages.</p>

        <!-- spacer + reset card -->
        <p class="section-header" aria-hidden="true">&nbsp;</p>
        <div class="card destructive-card">
          <button type="button" class="row row-button" @click="resetAll()" :disabled="busy">
            <span class="row-label danger">Reset to defaults</span>
          </button>
        </div>
        <p class="section-footer">Wipes your overrides — your messages will use each group's settings again.</p>

      </div>
    </template>

  </main>

  <!-- Fixed bottom save bar -->
  <div class="action-bar" :class="{ visible: state === 'ready' }">
    <p class="save-status" :class="{ success: !!savedAt && !error, error: !!error }"
       x-text="error ? error : (savedAt ? ('Saved · ' + savedAt) : 'Tap Save when you\u2019re happy with your changes')"></p>
    <button type="button" class="btn-primary" :disabled="busy" @click="save()">
      <span x-show="!busy">Save</span>
      <span x-show="busy">Saving…</span>
    </button>
  </div>

  <script src="/u.js"></script>
</body>
</html>
